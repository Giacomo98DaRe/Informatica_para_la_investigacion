<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curva ROC Interactiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Syne:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <h1>Curva ROC - Evaluacion del modelo predictivo</h1>

    <div class="grid">
      <section class="panel">
        <canvas id="rocCanvas" width="380" height="380" aria-label="Curva ROC"></canvas>
      </section>

      <section class="panel">
        <div class="control">
          <label id="thresholdLabel" for="threshold">Umbral de decision: 0.50</label>
          <input id="threshold" type="range" min="0" max="1" step="0.01" value="0.50" />
        </div>

        <div class="matrix" aria-label="Matriz de confusion">
          <div class="cell tp"><span class="k">TP</span><span class="v" id="tp">0</span></div>
          <div class="cell fp"><span class="k">FP</span><span class="v" id="fp">0</span></div>
          <div class="cell fn"><span class="k">FN</span><span class="v" id="fn">0</span></div>
          <div class="cell tn"><span class="k">TN</span><span class="v" id="tn">0</span></div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="k">Sensibilidad (TPR)</div>
            <div class="v" id="tprMetric">0.00</div>
          </div>
          <div class="metric">
            <div class="k">Especificidad (TNR)</div>
            <div class="v" id="tnrMetric">0.00</div>
          </div>
          <div class="metric">
            <div class="k">AUC</div>
            <div class="v" id="aucMetric">0.00</div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>

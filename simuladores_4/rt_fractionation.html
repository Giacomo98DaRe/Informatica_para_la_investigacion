<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraccionamiento RT - Modelo LQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Fraccionamiento en Radioterapia - Modelo LQ</h1>

    <section class="panel">
      <div class="controls">
        <div class="control">
          <label id="nLabel" for="nFractions">5 fracciones</label>
          <input id="nFractions" type="range" min="1" max="35" step="1" value="5" />
        </div>
        <div class="control">
          <label id="dLabel" for="dosePerFraction">d = 7.0 Gy/fraccion</label>
          <input id="dosePerFraction" type="range" min="0.5" max="20" step="0.5" value="7" />
        </div>
      </div>

      <div class="cards">
        <article class="card current">
          <h2>Configuracion actual</h2>
          <div class="metrics">
            <div class="metric"><div class="k">Dosis total</div><div class="v" id="curD">0</div></div>
            <div class="metric"><div class="k">BED tumor</div><div class="v" id="curBedTumor">0</div></div>
            <div class="metric"><div class="k">BED tejido tardio</div><div class="v" id="curBedTissue">0</div></div>
            <div class="metric"><div class="k">EQD2</div><div class="v" id="curEqd2">0</div></div>
          </div>
        </article>

        <article class="card conventional">
          <h2>RT convencional</h2>
          <div class="metrics">
            <div class="metric"><div class="k">Dosis total</div><div class="v" id="refD">0</div></div>
            <div class="metric"><div class="k">BED tumor</div><div class="v" id="refBedTumor">0</div></div>
            <div class="metric"><div class="k">BED tejido tardio</div><div class="v" id="refBedTissue">0</div></div>
            <div class="metric"><div class="k">EQD2</div><div class="v" id="refEqd2">0</div></div>
          </div>
        </article>
      </div>
    </section>

    <section class="panel">
      <canvas id="fractionCanvas" width="600" height="160" aria-label="Comparacion de fraccionamiento"></canvas>
      <div class="alerts">
        <div id="warnBed" class="alert red">⚠ BED tejido tardio elevado</div>
        <div id="warnTumor" class="alert orange">⚠ Dosis tumoral posiblemente insuficiente</div>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <h1>Extraccion de Features Radiomicas - Simulador interactivo</h1>

    <section class="layout">
      <article class="panel">
        <div id="pixelGrid" class="grid" aria-label="Imagen MRI simplificada"></div>
        <div class="tools">
          <button id="resetBtn" type="button">↺ Restaurar imagen original</button>
        </div>
      </article>

      <article class="panel feature-select">
        <label for="featureSelect">Feature</label>
        <select id="featureSelect">
          <option value="mean">Mean Intensity</option>
          <option value="std">Std Deviation</option>
          <option value="entropy">Entropy</option>
          <option value="contrast">Contrast (GLCM simplificado)</option>
          <option value="energy">Energy</option>
        </select>

        <div id="featureMeta" class="meta"></div>
        <div id="formulaBox" class="formula"></div>
        <div id="valueBox" class="value">0.00</div>
      </article>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
